name: Publish userscript

# Build on every push to master and cut a GitHub Release with the bundle
# attached. Greasy Fork syncs from the release "latest" asset URL; the repo
# webhook (Settings -> Webhooks, Releases event) pokes it to re-fetch.
on:
  push:
    branches: [master]

# Needed so the job can create releases and tags.
permissions:
  contents: write

# Serialize publishes (don't cancel) so rapid pushes each get a release and the
# newest ends up marked "latest".
concurrency:
  group: publish-userscript
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Build
        run: deno task build

      - name: Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Tag and title the release after the CalVer the build wrote to
          # dist/version.txt, so they never drift from the userscript's @version (the
          # header's releaseURL points at this tag). version.txt is not uploaded.
          version=$(cat dist/version.txt)
          # Make re-runs of the same commit idempotent: the CalVer is reproducible
          # from the commit timestamp, so the tag is stable per commit.
          gh release delete "$version" --yes --cleanup-tag 2>/dev/null || true
          gh release create "$version" dist/crosseyed.user.js \
            --title "$version" \
            --notes "Build of ${GITHUB_SHA}." \
            --latest
